<!DOCTYPE html>
<html>
<head>
    <title>Addition Calculator</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
            background-color:#f2f2f2;
        }

        .container{
            background:white;
            padding:30px;
            width:300px;
            margin:auto;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        input{
            padding:10px;
            margin:10px;
            width:80%;
        }

        button{
            padding:10px 20px;
            background-color:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:#0056b3;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }
    </style>

    <script>
        function addNumbers(){

            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);

            let sum = num1 + num2;

            document.getElementById("result").innerHTML = "Result: " + sum;
        }
    </script>

</head>

<body>

<div class="container">

<h2>Add Two Numbers</h2>

<input type="number" id="num1" placeholder="Enter first number">

<input type="number" id="num2" placeholder="Enter second number">

<br>

<button onclick="addNumbers()">Calculate</button>

<div id="result"></div>

</div>

</body>
</html>
